<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zhiend — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #f2ead8;
      --warm-off: #e8dfc8;
      --dark: #111009;
      --charcoal: #1e1c15;
      --groove: #2a2720;
      --accent: #c8431a;
      --accent-light: #e05528;
      --muted: #7a7160;
      --label: #9e9278;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      font-family: 'Crimson Pro', serif;
      overflow: hidden;
    }

    /* Left panel — decorative */
    .left-panel {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--charcoal);
      overflow: hidden;
    }

    /* Vinyl record graphic */
    .record-wrap {
      position: relative;
      width: 340px;
      height: 340px;
      animation: spin 18s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .record-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 60px rgba(200, 67, 26, 0.18));
    }

    .brand-overlay {
      position: absolute;
      bottom: 3rem;
      left: 3rem;
      right: 3rem;
      animation: fadeUp 0.9s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      color: var(--cream);
      letter-spacing: 6px;
      line-height: 1;
    }

    .brand-tagline {
      font-family: 'Crimson Pro', serif;
      font-size: 15px;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 1px;
      margin-top: 6px;
    }

    /* Grain texture overlay */
    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* Right panel — login form */
    .right-panel {
      width: 420px;
      flex-shrink: 0;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2.5rem;
      position: relative;
      border-left: 1px solid var(--groove);
    }

    .form-inner {
      width: 100%;
      animation: fadeUp 0.8s 0.15s ease both;
    }

    .form-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .form-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      color: var(--cream);
      letter-spacing: 3px;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .form-sub {
      font-size: 15px;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--label);
      margin-bottom: 8px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      font-size: 16px;
      font-family: 'Crimson Pro', serif;
      background: var(--groove);
      border: 1px solid #3a3628;
      border-radius: 4px;
      color: var(--cream);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200, 67, 26, 0.14);
    }

    .field-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }

    .forgot {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .forgot:hover { color: var(--cream); }

    .login-btn {
      width: 100%;
      margin-top: 2rem;
      padding: 13px;
      background: var(--accent);
      color: var(--cream);
      border: none;
      border-radius: 4px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 4px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .login-btn:hover { background: var(--accent-light); }
    .login-btn:active { transform: scale(0.98); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.75rem 0 1.25rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--groove);
    }

    .divider span {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .register-link {
      text-align: center;
      font-size: 15px;
      font-style: italic;
      color: var(--muted);
    }

    .register-link a {
      color: var(--cream);
      text-decoration: none;
      font-style: normal;
      font-weight: 600;
      border-bottom: 1px solid var(--groove);
      padding-bottom: 1px;
      transition: border-color 0.15s;
    }

    .register-link a:hover {
      border-color: var(--accent);
    }

    /* Mobile: stack panels */
    @media (max-width: 700px) {
      body { flex-direction: column; overflow: auto; }
      .left-panel { display: none; }
      .right-panel { width: 100%; border-left: none; min-height: 100vh; }
    }
  </style>
</head>
<body>

  <!-- Left decorative panel -->
  <div class="left-panel">
    <div class="grain"></div>

    <div class="record-wrap">
      <svg class="record-svg" viewBox="0 0 340 340" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer vinyl -->
        <circle cx="170" cy="170" r="168" fill="#0d0c0a" stroke="#2a2720" stroke-width="1"/>
        <!-- Groove rings -->
        <circle cx="170" cy="170" r="158" fill="none" stroke="#1a1916" stroke-width="0.6"/>
        <circle cx="170" cy="170" r="148" fill="none" stroke="#1a1916" stroke-width="0.6"/>
        <circle cx="170" cy="170" r="138" fill="none" stroke="#1c1b18" stroke-width="0.6"/>
        <circle cx="170" cy="170" r="128" fill="none" stroke="#1c1b18" stroke-width="0.6"/>
        <circle cx="170" cy="170" r="118" fill="none" stroke="#1e1d19" stroke-width="0.6"/>
        <circle cx="170" cy="170" r="108" fill="none" stroke="#1e1d19" stroke-width="0.8"/>
        <circle cx="170" cy="170" r="98" fill="none" stroke="#201f1b" stroke-width="0.8"/>
        <circle cx="170" cy="170" r="88" fill="none" stroke="#201f1b" stroke-width="0.8"/>
        <!-- Label area -->
        <circle cx="170" cy="170" r="68" fill="#c8431a"/>
        <circle cx="170" cy="170" r="64" fill="#b83c17"/>
        <!-- Label text -->
        <text x="170" y="158" text-anchor="middle" font-family="'Bebas Neue', sans-serif" font-size="20" fill="#f2ead8" letter-spacing="4">ZHIEND</text>
        <text x="170" y="174" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#e8b8a8" letter-spacing="1.5">RECORDS &amp; INSTRUMENTS</text>
        <line x1="140" y1="180" x2="200" y2="180" stroke="#e8b8a8" stroke-width="0.5" opacity="0.5"/>
        <text x="170" y="192" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#e8b8a8" opacity="0.7">SIDE A — 33⅓ RPM</text>
        <!-- Center hole -->
        <circle cx="170" cy="170" r="5" fill="#0d0c0a"/>
        <!-- Sheen -->
        <ellipse cx="130" cy="130" rx="60" ry="30" fill="white" opacity="0.02" transform="rotate(-30 170 170)"/>
      </svg>
    </div>

    <div class="brand-overlay">
      <div class="brand-name">Zhiend</div>
      <div class="brand-tagline">Instruments & Vinyls — Est. 2024</div>
    </div>
  </div>

  <!-- Right login panel -->
  <div class="right-panel">
    <div class="form-inner">
      <div class="form-eyebrow">Member access</div>
      <h1 class="form-title">Sign In</h1>
      <p class="form-sub">Good to have you back.</p>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />
        <div class="field-footer">
          <a class="forgot" href="#">Forgot password?</a>
        </div>
      </div>

      <!-- TODO: Connect to database/backend authentication here -->
      <button class="login-btn" onclick="handleLogin()">Enter the store</button>

      <div class="divider"><span>or</span></div>

      <p class="register-link">
        New here? <a href="#">Create an account</a>
      </p>
    </div>
  </div>

    function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      //   else showError(data.message);
      // });

    }
  </script>

</body>
</html>
